<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Un Show Mas - Phaser Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style> body { margin: 0; background: #000; overflow: hidden; } canvas { display: block; margin: 0 auto; } </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 1280, height: 720,
        backgroundColor: '#000',
        parent: 'game-container',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let morde, rigby, sfxHit, sfxFight, sfxWin, hud;
    let mordeHp = 100, rigbyHp = 100, mordeHpBar, rigbyHpBar;
    let isGameOver = false;

    function preload() {
        this.load.image('bg', 'escenario_parque.png');
        this.load.image('fight_logo', 'cartel_fight.png');
        this.load.image('hud', 'hud_1.png');
        this.load.image('morde_pose', 'mordecai_pose.png');
        this.load.image('morde_ataque', 'mordecai_ataque.png'); 
        this.load.image('morde_dolor', 'mordecai_dolor.png');
        this.load.image('rigby_pose', 'rigby_pose.png');
        this.load.image('rigby_ataque', 'rigby_ataque.png'); 
        this.load.image('rigby_dolor', 'rigby_dolor.png');
        this.load.audio('fight_snd', 'sonido_fight.mp3');
        this.load.audio('hit_snd', 'golpe.mp3');
        this.load.audio('win_snd', 'sonido_win.mp3');
        this.load.image('btn_a', 'btn_a.png');
        this.load.image('btn_x', 'btn_x.png');
    }

    function create() {
        this.add.image(640, 360, 'bg').setDisplaySize(1280, 720);
        sfxFight = this.sound.add('fight_snd', { volume: 0.5 });
        sfxHit = this.sound.add('hit_snd', { volume: 0.3 });
        sfxWin = this.sound.add('win_snd', { volume: 0.6 });

        morde = this.physics.add.sprite(300, 520, 'morde_pose').setScale(0.5);
        morde.setCollideWorldBounds(true);
        rigby = this.physics.add.sprite(980, 550, 'rigby_pose').setScale(0.6);
        rigby.setCollideWorldBounds(true).setFlipX(true);

        // --- HUD Y BARRAS (AJUSTADAS AL VIDEO) ---
        hud = this.add.image(640, 100, 'hud').setScale(1.1); // Subimos y agrandamos un poco el HUD
        
        // Las barras ahora están posicionadas justo detrás de los huecos de tu HUD
        mordeHpBar = this.add.rectangle(468, 72, 365, 30, 0x00ff00).setOrigin(1, 0.5);
        rigbyHpBar = this.add.rectangle(812, 72, 365, 30, 0x00ff00).setOrigin(0, 0.5);

        // --- BOTONES (AQUÍ ESTÁN!) ---
        let hitA = this.add.image(1050, 600, 'btn_a').setScale(0.8).setInteractive();
        let hitX = this.add.image(1180, 600, 'btn_x').setScale(0.8).setInteractive();
        
        hitA.on('pointerdown', () => atacar(morde, rigby, 10));
        hitX.on('pointerdown', () => atacar(morde, rigby, 20)); // El X saca más

        // Zonas de movimiento (Invisibles pero grandes para tu tablet)
        let btnL = this.add.rectangle(150, 600, 300, 300, 0xffffff, 0).setInteractive();
        let btnR = this.add.rectangle(450, 600, 300, 300, 0xffffff, 0).setInteractive();
        btnL.on('pointerdown', () => morde.setVelocityX(-400));
        btnL.on('pointerup', () => morde.setVelocityX(0));
        btnR.on('pointerdown', () => morde.setVelocityX(400));
        btnR.on('pointerup', () => morde.setVelocityX(0));

        let logo = this.add.image(640, 350, 'fight_logo').setScale(0.8);
        this.time.delayedCall(1000, () => { sfxFight.play(); logo.destroy(); });
    }

    function update() {
        if (isGameOver) return;

        // IA DE RIGBY MEJORADA
        let dist = Phaser.Math.Distance.Between(morde.x, morde.y, rigby.x, rigby.y);
        if (dist > 180) {
            this.physics.moveToObject(rigby, morde, 200);
            rigby.setFlipX(rigby.body.velocity.x < 0);
        } else {
            rigby.setVelocity(0);
            if (Phaser.Math.Between(0, 100) > 97) atacar(rigby, morde, 5);
        }

        // Actualizar vida visualmente
        mordeHpBar.width = (mordeHp / 100) * 365;
        rigbyHpBar.width = (rigbyHp / 100) * 365;
    }

    function atacar(quien, aQuien, daño) {
        if (isGameOver) return;
        quien.setTexture(quien.texture.key.replace('pose', 'ataque'));
        
        let dist = Phaser.Math.Distance.Between(quien.x, quien.y, aQuien.x, aQuien.y);
        if (dist < 250) {
            sfxHit.play();
            if (aQuien === rigby) {
                rigbyHp -= daño;
                rigby.x += 60; // KNOCKBACK: Rigby sale volando a la derecha
            } else {
                mordeHp -= daño;
                morde.x -= 30; // Morde retrocede si le pegan
            }
            aQuien.setTexture(aQuien.texture.key.replace('pose', 'dolor'));
            game.scene.scenes[0].time.delayedCall(300, () => {
                if(!isGameOver) aQuien.setTexture(aQuien.texture.key.includes('morde') ? 'morde_pose' : 'rigby_pose');
            });
        }
        game.scene.scenes[0].time.delayedCall(400, () => {
            if(!isGameOver) quien.setTexture(quien.texture.key.includes('morde') ? 'morde_pose' : 'rigby_pose');
        });

        if (rigbyHp <= 0 || mordeHp <= 0) finalizarJuego();
    }

    function finalizarJuego() {
        isGameOver = true;
        rigby.setVelocity(0);
        morde.setVelocity(0);
        sfxWin.play();
        let txt = mordeHp > 0 ? 'MORDECAI GANA' : 'RIGBY GANA';
        game.scene.scenes[0].add.text(640, 360, txt, { fontSize: '80px', fill: '#fff', stroke: '#000', strokeThickness: 10 }).setOrigin(0.5);
        
        // Botón de REINICIO que aparece a los 3 segundos
        game.scene.scenes[0].time.delayedCall(3000, () => {
            let restartBtn = game.scene.scenes[0].add.text(640, 500, 'TOCA PARA REINICIAR', { fontSize: '40px', fill: '#ffff00' }).setOrigin(0.5).setInteractive();
            restartBtn.on('pointerdown', () => location.reload());
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selección de Personaje - Un Show Más</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        .interfaz {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: calc(100vh * (16 / 9));
            max-height: calc(100vw * (9 / 16));
            background-image: url('fondo_seleccion.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
        }

        @keyframes respirar-p1 {
            0% { transform: translateY(0); }
            50% { transform: translateY(-3%); } 
            100% { transform: translateY(0); }
        }

        @keyframes respirar-p2 {
            0% { transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(-3%); } 
            100% { transform: scaleX(-1) translateY(0); }
        }

        .render {
            position: absolute;
            bottom: 42%; 
            height: 40%; 
            max-width: 22%; 
            object-fit: contain;
            object-position: bottom center; 
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        #render-p1 { 
            left: 5%; 
            animation: respirar-p1 3s ease-in-out infinite; 
        }
        
        #render-p2 { 
            right: 5%; 
            animation: respirar-p2 3s ease-in-out infinite; 
        } 

        .grilla-iconos {
            position: absolute;
            top: 29%; 
            left: 50%;
            transform: translateX(-50%);
            width: 40%; 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5%; 
            z-index: 10;
        }

        .icono-personaje {
            width: 100%;
            aspect-ratio: 1 / 1; 
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.2s;
        }

        .icono-personaje:hover {
            transform: scale(1.1);
            border-color: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }

        .boton-aleatorio {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 8%;
            height: 12%;
            cursor: pointer;
            z-index: 20;
        }

        .nombre-container {
            position: absolute;
            bottom: 6%;
            width: 25%;
            text-align: center;
            z-index: 5;
        }

        #nombre-p1-container { left: 4%; }
        #nombre-p2-container { right: 4%; }

        .nombre-label {
            font-size: clamp(12px, 2.5vw, 32px); 
            color: white;
            text-shadow: 2px 2px #000;
            font-weight: bold;
            text-transform: uppercase;
            font-style: italic;
        }

        .boton-listo {
            position: absolute;
            bottom: 18%; 
            width: 22%;
            height: 10%;
            cursor: pointer;
            z-index: 20;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        #btn-listo-p1 { left: 4.5%; }
        #btn-listo-p2 { right: 4.5%; cursor: default; } 

        .listo-blue {
            box-shadow: 0 0 20px #00d4ff, inset 0 0 15px #00d4ff;
            background-color: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
        }

        .listo-red {
            box-shadow: 0 0 20px #ff0000, inset 0 0 15px #ff0000;
            background-color: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
        }
    </style>
</head>
<body>

    <audio id="musica-fondo" src="musica_seleccion.mp3" loop></audio>

    <div class="interfaz">
        <img id="render-p1" class="render" src="render_mordecai.png">
        <img id="render-p2" class="render" src="render_rigby.png">

        <div class="nombre-container" id="nombre-p1-container">
            <div class="nombre-label" id="nombre-p1">MORDECAI</div>
        </div>
        <div class="nombre-container" id="nombre-p2-container">
            <div class="nombre-label" id="nombre-p2">RIGBY</div>
        </div>

        <div id="btn-listo-p1" class="boton-listo" onclick="confirmarPelea()"></div>
        <div id="btn-listo-p2" class="boton-listo"></div>

        <div class="grilla-iconos">
            <img src="icon_mordecai.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('mordecai')">
            <img src="icon_rigby.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('rigby')">
            <img src="icon_benson.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('benson')">
            <img src="icon_skips.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('skips')">
            <img src="icon_musculoso.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('musculoso')">
            <img src="icon_fantasmin.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('fantasmin')">
            <img src="icon_papaleta.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('papaleta')">
            <img src="icon_la_muerte.png" class="icono-personaje" onmouseenter="playHover()" onclick="elegir('la_muerte')">
        </div>

        <div class="boton-aleatorio" onmouseenter="playHover()" onclick="elegirAleatorio()"></div>
    </div>

    <script>
        const personajes = ['mordecai', 'rigby', 'benson', 'skips', 'musculoso', 'fantasmin', 'papaleta', 'la_muerte'];
        let peleaConfirmada = false;
        let musicaIniciada = false;
        
        // Creador de sonido 8-bit con JavaScript (¡Chau .mp3!)
        let audioCtx;
        function generarBipRetro() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square'; // Tipo de onda "cuadrada" para que suene a maquinita vieja
            oscillator.frequency.setValueAtTime(450, audioCtx.currentTime); // Tono inicial
            oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1); // Sube el tono un poquito
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Volumen bajito (5%)
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); // Se apaga rápido
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1); // Dura solo 0.1 segundos
        }

        function playHover() {
            if(peleaConfirmada) return; 
            generarBipRetro(); // Llama al sonido creado con código
        }

        function arrancarMusica() {
            if (!musicaIniciada) {
                const audio = document.getElementById('musica-fondo');
                audio.volume = 0.6; 
                audio.play().catch(e => console.log("Esperando interacción para la música..."));
                musicaIniciada = true;
            }
        }

        function elegir(personaje) {
            arrancarMusica(); 
            playHover(); 

            if(peleaConfirmada) return; 
            
            document.getElementById('render-p1').src = `render_${personaje}.png`;
            document.getElementById('nombre-p1').innerText = personaje.replace('_', ' ');
            eleccionMaquina();
        }

        function eleccionMaquina() {
            const indiceAzar = Math.floor(Math.random() * personajes.length);
            const personajeMaquina = personajes[indiceAzar];
            document.getElementById('render-p2').src = `render_${personajeMaquina}.png`;
            document.getElementById('nombre-p2').innerText = personajeMaquina.replace('_', ' ');
        }

        function elegirAleatorio() {
            arrancarMusica(); 
            playHover();

            if(peleaConfirmada) return;
            const indiceAzarP1 = Math.floor(Math.random() * personajes.length);
            elegir(personajes[indiceAzarP1]);
        }

        function confirmarPelea() {
            arrancarMusica(); 
            
            if (!peleaConfirmada) {
                peleaConfirmada = true; 
                // Sonido especial más agudo para confirmar
                if (audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                }

                document.getElementById('btn-listo-p1').classList.add('listo-blue');
                
                setTimeout(() => {
                    document.getElementById('btn-listo-p2').classList.add('listo-red');
                    setTimeout(() => alert('¡PREPARADOS PARA LA PELEA!'), 600);
                }, 800);
            }
        }
    </script>

</body>
</html>

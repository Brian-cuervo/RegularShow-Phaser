<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Regular Show - Ultimate Fight (Knockback Edition)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Anton', sans-serif; }
        
        #game-stage {
            width: 100vw; height: 100vh;
            background-size: cover; background-position: center bottom;
            position: relative; overflow: hidden;
        }

        .pj {
            position: absolute; bottom: 15%; 
            width: auto; image-rendering: pixelated;
            z-index: 10; transition: transform 0.1s linear;
            will-change: transform; 
        }
        #mordecai { height: 35vh; min-height: 150px; left: 0; }
        #rigby { height: 20vh; min-height: 90px; left: 0; }
        
        #hud-container {
            position: absolute; top: 3%; left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 700px; aspect-ratio: 6 / 1; 
            z-index: 100;
        }
        
        .hud-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: fill; z-index: 102; pointer-events: none;
        }

        .hp-background {
            position: absolute; top: 32%; height: 28%; width: 36%;
            background: rgba(255,0,0,0.8); z-index: 101;
        }
        #bg-morde { left: 9.5%; } 
        #bg-rigby { right: 9.5%; }

        .hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.2s; will-change: width; }
        #hp-rigby-fill { float: right; }

        .name-label { 
            position: absolute; top: -140%; 
            color: yellow; 
            font-size: clamp(14px, 3vw, 22px); 
            text-shadow: 2px 2px 0px rgba(0,0,0,1), 4px 4px 0px rgba(255,0,0,0.8); 
            letter-spacing: 2px;
            z-index: 103; 
        }

        #start-screen, #fight-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 200; flex-direction: column;
        }
        #start-screen { z-index: 300; background: #000; color: #fff; font-size: 24px; text-align: center; }
        
        #win-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center; 
            z-index: 200; flex-direction: column; background: rgba(0,0,0,0); 
        }
        
        #win-text { 
            font-size: clamp(32px, 8vw, 60px); 
            text-align: center; line-height: 1.1; margin-bottom: 20px;
            background: linear-gradient(180deg, rgba(235,39,18,1) 0%, rgba(253,208,0,1) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px black); letter-spacing: 4px;
        }

        #fight-logo { width: 45vw; max-width: 350px; animation: bounceIn 0.6s; }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }

        #controls {
            position: absolute; bottom: 18%; 
            width: 100%; display: flex; justify-content: space-between; padding: 0 5%; z-index: 150;
        }
        
        #analog-container {
            position: relative; width: 16vh; height: 16vh; min-width: 110px; min-height: 110px;
            background-image: url('control_analogo.png'); background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: transform 0.1s;
        }
        
        .analog-btn { position: absolute; width: 50%; height: 100%; top: 0; }
        #left { left: 0; }
        #right { right: 0; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5vh; align-items: center; justify-items: center; }
        .btn-action-img {
            width: 9vh; height: 9vh; min-width: 55px; min-height: 55px; object-fit: contain;
            transition: transform 0.1s;
        }
        .btn-action-img:active { transform: scale(0.85); }

        .smoke, .hit-fx { position: absolute; z-index: 15; image-rendering: pixelated; pointer-events: none; }
        .smoke { width: 6vw; min-width: 45px; animation: smokeOut 0.4s forwards; }
        .hit-fx { width: 8vw; min-width: 60px; animation: hitPop 0.2s forwards; }
        @keyframes smokeOut { to { transform: translateY(-20px) scale(1.5); opacity: 0; } }
        @keyframes hitPop { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 0; } }
        #preload { display: none; }
    </style>
</head>
<body>

<div id="preload">
    <img src="mordecai_ataque.png"><img src="mordecai_ataque_fuerte.png"><img src="mordecai_dolor.png"><img src="mordecai_caminar_1.png"><img src="mordecai_caminar_2.png"><img src="mordecai_ganar_2.png">
    <img src="rigby_ataque.png"><img src="rigby_dolor.png"><img src="rigby_caminar_1.png"><img src="rigby_caminar_2.png"><img src="rigby_ganar_2.png">
    <img src="efecto_golpe.png"><img src="efecto_humo.png"><img src="hud_1.png">
</div>

<div id="game-stage">
    <div id="start-screen"><h1 style="color:yellow; text-shadow: 2px 2px red;">TOCÁ LA PANTALLA<br>PARA EMPEZAR</h1></div>
    <div id="fight-screen" style="display:none;"><img id="fight-logo" src="cartel_fight.png"></div>
    <div id="win-screen"><span id="win-text"></span></div>

    <div id="hud-container">
        <img id="hud-img" class="hud-frame" src="hud_1.png">
        <div class="hp-background" id="bg-morde">
            <span class="name-label" style="left:0;">MORDECAI</span>
            <div id="hp-morde-fill" class="hp-fill"></div>
        </div>
        <div class="hp-background" id="bg-rigby">
            <span class="name-label" style="right:0;">RIGBY</span>
            <div id="hp-rigby-fill" class="hp-fill"></div>
        </div>
    </div>

    <img id="mordecai" class="pj" src="mordecai_pose.png">
    <img id="rigby" class="pj" src="rigby_pose.png">

    <div id="controls">
        <div id="analog-container">
            <div class="analog-btn" id="left"></div>
            <div class="analog-btn" id="right"></div>
        </div>
        <div class="actions">
            <img src="btn_y.png" class="btn-action-img" id="btn-y">
            <img src="btn_x.png" class="btn-action-img" id="btn-x">
            <img src="btn_b.png" class="btn-action-img" id="btn-b">
            <img src="btn_a.png" class="btn-action-img" id="btn-a">
        </div>
    </div>
</div>

<script>
    const escenarios = ['escenario_casa_noche.png', 'escenario_casa_dia.png', 'escenario_arbol_espacio.png', 'escenario_parque_espacio.png', 'escenario_parque.png', 'escenario_tiro.png'];
    const stage = document.getElementById('game-stage');
    stage.style.backgroundImage = `url('${escenarios[Math.floor(Math.random() * escenarios.length)]}')`;

    const sfxFight = new Audio('sonido_fight.mp3');
    const sfxHit = new Audio('golpe.mp3');
    const sfxHitFuerte = new Audio('golpe_fuerte.mp3');
    const sfxWin = new Audio('sonido_win.mp3');

    function playAudio(audioObj) {
        audioObj.currentTime = 0;
        audioObj.play().catch(e => {}); 
    }

    const startScreen = document.getElementById('start-screen');
    const fightScreen = document.getElementById('fight-screen');

    startScreen.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startScreen.style.display = 'none';
        fightScreen.style.display = 'flex';
        sfxFight.load(); sfxHit.load(); sfxHitFuerte.load(); sfxWin.load();
        playAudio(sfxFight);
        setTimeout(() => {
            fightScreen.style.opacity = '0';
            setTimeout(() => fightScreen.style.display = 'none', 500);
            startGame();
        }, 1500);
    });

    const morde = document.getElementById('mordecai');
    const rigby = document.getElementById('rigby');
    const hpMordeFill = document.getElementById('hp-morde-fill');
    const hpRigbyFill = document.getElementById('hp-rigby-fill');

    let screenW = window.innerWidth;
    let mordeX = screenW * 0.15;
    let rigbyX = screenW * 0.70;
    let mordeHp = 100, rigbyHp = 100;
    let mordeAttacking = false, rigbyAttacking = false;
    let gameOver = false;
    let walkFrame = 1;
    let mordeMoving = false;
    let mordeDir = null;
    let moveLoop = null;

    function updatePositions() {
        morde.style.transform = `translateX(${mordeX}px) scaleX(${morde.dataset.scaleX || 1})`;
        rigby.style.transform = `translateX(${rigbyX}px) scaleX(${rigby.dataset.scaleX || -1})`;
    }
    updatePositions();

    // 🔥 FUNCIÓN DE RETROCESO (KNOCKBACK) 🔥
    function applyKnockback(target) {
        const pushAmount = 30; // Cuánto se aleja
        if (target === 'rigby') {
            rigbyX += (mordeX < rigbyX) ? pushAmount : -pushAmount;
        } else {
            mordeX += (rigbyX < mordeX) ? pushAmount : -pushAmount;
        }
        // Evitar que salgan de la pantalla
        mordeX = Math.max(0, Math.min(mordeX, window.innerWidth - 120));
        rigbyX = Math.max(0, Math.min(rigbyX, window.innerWidth - 120));
        updatePositions();
    }

    function spawnEffect(type) {
        const fx = document.createElement('img');
        fx.src = type === 'smoke' ? 'efecto_humo.png' : 'efecto_golpe.png';
        fx.className = type === 'smoke' ? 'smoke' : 'hit-fx';
        if (type === 'hit') {
            fx.style.left = ((mordeX + rigbyX) / 2) + 20 + 'px'; 
            fx.style.bottom = '22%';
        }
        stage.appendChild(fx);
        setTimeout(() => fx.remove(), 400);
    }

    function checkCollision() { return Math.abs(mordeX - rigbyX) < 80; }

    function updateBars() {
        hpMordeFill.style.width = mordeHp + '%';
        hpRigbyFill.style.width = rigbyHp + '%';
        if (mordeHp < 30) hpMordeFill.style.background = 'yellow';
        if (rigbyHp < 30) hpRigbyFill.style.background = 'yellow';
    }

    function endGame(winner) {
        gameOver = true;
        clearInterval(moveLoop);
        playAudio(sfxWin);
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-text').innerHTML = `${winner} WINS!<br><span style="font-size:24px; color:white; filter:drop-shadow(2px 2px black); font-family:sans-serif;">Toca para reiniciar</span>`;
        document.getElementById('win-screen').onclick = () => location.reload();
        if (winner === 'MORDECAI') { morde.src = 'mordecai_ganar_2.png'; rigby.src = 'rigby_dolor.png'; } 
        else { rigby.src = 'rigby_ganar_2.png'; morde.src = 'mordecai_dolor.png'; }
    }

    function startMove(dir) {
        if (mordeMoving || mordeAttacking || gameOver) return;
        mordeMoving = true; mordeDir = dir;
        moveLoop = setInterval(() => {
            mordeX += (mordeDir === 'right' ? 18 : -18); 
            mordeX = Math.max(0, Math.min(mordeX, window.innerWidth - 120)); 
            morde.dataset.scaleX = mordeDir === 'left' ? -1 : 1;
            updatePositions();
            walkFrame = walkFrame === 1 ? 2 : 1;
            morde.src = `mordecai_caminar_${walkFrame}.png`;
        }, 80);
    }

    function stopMove() { mordeMoving = false; clearInterval(moveLoop); if (!mordeAttacking && !gameOver) morde.src = 'mordecai_pose.png'; }

    function attackMorde(type) {
        if (mordeAttacking || gameOver) return;
        mordeAttacking = true;
        morde.src = (type === 'X' || type === 'Y') ? 'mordecai_ataque_fuerte.png' : 'mordecai_ataque.png';
        if (checkCollision()) {
            if (type === 'X' || type === 'Y') { playAudio(sfxHitFuerte); rigbyHp -= 8; } else { playAudio(sfxHit); rigbyHp -= 5; }
            rigbyHp = Math.max(0, rigbyHp);
            rigby.src = 'rigby_dolor.png';
            spawnEffect('hit');
            applyKnockback('rigby'); // Empuja a Rigby
            updateBars();
            if (rigbyHp <= 0) { endGame('MORDECAI'); return; }
        }
        setTimeout(() => { if (!gameOver) morde.src = 'mordecai_pose.png'; mordeAttacking = false; }, 300);
    }

    function rigbyAI() {
        if (gameOver) return;
        const distance = mordeX - rigbyX;
        if (Math.abs(distance) > 80) {
            rigbyX += distance > 0 ? 20 : -20; 
            rigby.dataset.scaleX = distance < 0 ? -1 : 1; 
            updatePositions();
            walkFrame = walkFrame === 1 ? 2 : 1;
            rigby.src = `rigby_caminar_${walkFrame}.png`;
        } else {
            if (!rigbyAttacking && Math.random() > 0.4) {
                rigbyAttacking = true;
                rigby.src = 'rigby_ataque.png';
                if (!mordeAttacking) {
                    playAudio(sfxHit);
                    mordeHp -= 5; mordeHp = Math.max(0, mordeHp);
                    morde.src = 'mordecai_dolor.png';
                    spawnEffect('hit');
                    applyKnockback('mordecai'); // Empuja a Mordecai
                    updateBars();
                    if (mordeHp <= 0) { endGame('RIGBY'); return; }
                }
                setTimeout(() => { if (!gameOver) rigby.src = 'rigby_pose.png'; rigbyAttacking = false; }, 350);
            }
        }
    }

    function startGame() { setInterval(rigbyAI, 300); }

    const analog = document.getElementById('analog-container');
    document.getElementById('left').addEventListener('touchstart', (e) => { e.preventDefault(); startMove('left'); analog.style.transform = 'scale(0.9) translateX(-15px)'; });
    document.getElementById('left').addEventListener('touchend', (e) => { e.preventDefault(); stopMove(); analog.style.transform = 'scale(1) translateX(0)'; });
    document.getElementById('right').addEventListener('touchstart', (e) => { e.preventDefault(); startMove('right'); analog.style.transform = 'scale(0.9) translateX(15px)'; });
    document.getElementById('right').addEventListener('touchend', (e) => { e.preventDefault(); stopMove(); analog.style.transform = 'scale(1) translateX(0)'; });
    document.getElementById('btn-a').addEventListener('touchstart', (e) => { e.preventDefault(); attackMorde('A'); });
    document.getElementById('btn-b').addEventListener('touchstart', (e) => { e.preventDefault(); attackMorde('B'); });
    document.getElementById('btn-x').addEventListener('touchstart', (e) => { e.preventDefault(); attackMorde('X'); });
    document.getElementById('btn-y').addEventListener('touchstart', (e) => { e.preventDefault(); attackMorde('Y'); });
</script>

</body>
</html>
